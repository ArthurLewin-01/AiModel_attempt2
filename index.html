<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Companion Chat</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white">

<div class="h-screen flex flex-col">

    <!-- HOME SCREEN -->
    <div id="normalChat" class="flex-1 flex items-center justify-center flex-col">
        <h1 class="text-3xl mb-4">AI Companion Chat</h1>

        <button id="quickChatBtn"
            class="px-6 py-3 bg-blue-500 rounded-xl">
            Quick Chat
        </button>
    </div>

    <!-- CHAT SCREEN -->
    <div id="videoContainer" class="hidden flex-1 flex flex-col">

        <!-- CHAT MESSAGES -->
        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-2"></div>

        <!-- INPUT -->
        <div class="p-4 flex gap-2">
            <input id="messageInput"
                class="flex-1 p-2 text-black rounded"
                placeholder="Type message..." />

            <button id="sendBtn"
                class="bg-blue-500 px-4 rounded">
                Send
            </button>
        </div>

    </div>

</div>

<!-- ✅ SCRIPT -->
<script>
document.getElementById("quickChatBtn").addEventListener("click", () => {
    document.getElementById("normalChat").style.display = "none";
    document.getElementById("videoContainer").classList.remove("hidden");
});

document.getElementById("sendBtn").addEventListener("click", sendMessage);

function sendMessage() {
    const input = document.getElementById("messageInput");
    const message = input.value;

    if (!message) return;

    const chat = document.getElementById("chatMessages");

    const userMsg = document.createElement("div");
    userMsg.innerText = "You: " + message;
    chat.appendChild(userMsg);

    input.value = "";
}
</script>

</body>
</html>
