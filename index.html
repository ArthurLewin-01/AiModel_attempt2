<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Companion Chat</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-900 text-white flex">

<!-- SIDEBAR (CHAT HISTORY) -->
<div id="sidebar" class="w-72 bg-gray-800 p-4 hidden flex-col">

    <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold">Chats</h2>
        <button id="newChatBtn" class="bg-blue-500 px-2 py-1 rounded">+</button>
    </div>

    <!-- SEARCH -->
    <input id="searchChat" placeholder="Search chat..." class="w-full p-2 mb-4 text-black rounded">

    <!-- CHAT LIST -->
    <div id="chatHistory" class="flex-1 overflow-y-auto space-y-2"></div>

</div>

<!-- MAIN APP -->
<div class="flex-1">

<!-- HOME SCREEN -->
<div id="homeScreen" class="h-screen flex flex-col items-center justify-center text-center">

    <h1 class="text-3xl font-bold mb-6">AI Companion Chat</h1>

    <div class="space-x-4">
        <button id="quickChatBtn" class="px-6 py-3 bg-blue-500 rounded-lg">Quick Chat</button>
        <button id="companionBtn" class="px-6 py-3 bg-purple-500 rounded-lg">AI Companion</button>
    </div>

</div>

<!-- SETUP MODAL -->
<div id="setupModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">

    <div class="bg-gray-800 p-6 rounded-xl w-80 text-center">

        <h2 class="text-xl mb-4">Upload Image</h2>

        <input type="file" id="personImage" class="mb-4">

        <div id="imagePreview" class="h-40 bg-gray-700 mb-4 flex items-center justify-center">
            Preview
        </div>

        <button id="closeModal" class="px-4 py-2 bg-red-500 rounded">Close</button>
    </div>

</div>

<!-- CHAT SCREEN -->
<div id="chatScreen" class="hidden h-screen flex flex-col">

    <!-- TOP BAR -->
    <div class="p-4 flex justify-between items-center">

        <button id="backBtn" class="px-4 py-2 bg-white/20 rounded-lg">← Back</button>

        <button id="toggleSidebar" class="px-4 py-2 bg-white/20 rounded-lg">
            ☰ Chats
        </button>

    </div>

    <!-- CHAT MESSAGES -->
    <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-2"></div>

    <!-- INPUT -->
    <div class="p-4 flex gap-2">
        <input id="messageInput" class="flex-1 p-2 text-black rounded" placeholder="Type message...">
        <button id="sendBtn" class="px-4 bg-blue-500 rounded">Send</button>
    </div>

</div>

</div>

<!-- LINK JS FILE -->
<script src="script.js"></script>

</body>
</html>
