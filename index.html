<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Companion Chat - Talk to Anyone</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .chat-bubble { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
    </style>
</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen text-white">

<!-- HEADER -->
<header class="bg-white/10 backdrop-blur-md border-b border-white/20 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between">
        <h1 class="text-2xl font-bold">AI Companion Chat</h1>
        <button id="sidebarToggle">☰</button>
    </div>
</header>

<div class="flex h-screen">

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar w-64 bg-white/5 p-4">
        <h2>Chat History</h2>
    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col">

        <!-- CHAT AREA -->
        <div id="chatMessages" class="flex-1 overflow-y-auto p-6 space-y-4">
        </div>

        <!-- INPUT -->
        <div class="p-4 flex gap-3">
            <input id="messageInput"
                class="flex-1 p-3 rounded-xl text-black"
                placeholder="Type message..." />

            <button id="sendBtn"
                class="px-4 py-2 bg-blue-500 rounded-xl">
                Send
            </button>
        </div>

    </div>

</div>

<!-- ✅ LINKED SCRIPT -->
<script src="script.js"></script>

</body>
</html>
